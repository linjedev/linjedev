name: LinjeTune iOS

on:
  push:
    branches: [main]
    paths:
      - "src/features/tunelab/**"
      - "speedtest-app/tunelab-entry/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/linjetune-ios.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/features/tunelab/**"
      - "speedtest-app/tunelab-entry/**"
      - "ios/**"
      - "capacitor.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/linjetune-ios.yml"

permissions:
  contents: read

jobs:
  build-simulator:
    name: Build iOS Simulator App
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Ensure CocoaPods
        run: pod --version || sudo gem install cocoapods

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build iOS simulator target
        run: pnpm ios:build:sim
