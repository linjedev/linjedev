name: Docker Image CI

# Only rebuild the image when files that affect the final container change.
# Doc/agent-rules/test-only changes skip the expensive multi-stage build.
# Skipped workflow runs satisfy GitHub required status checks (neutral pass).
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "prisma/**"
      - "packages/**"
      - "scripts/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - ".github/workflows/docker-publish.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "prisma/**"
      - "packages/**"
      - "scripts/**"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - ".github/workflows/docker-publish.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Expose Docker Desktop CLI
        run: |
          mkdir -p "$HOME/bin"
          cat > "$HOME/bin/docker" <<'EOF'
          #!/usr/bin/env bash
          if [ -n "${DOCKER_CONFIG:-}" ]; then
            export DOCKER_CONFIG="$(wslpath -w "$DOCKER_CONFIG")"
          fi
          exec "/mnt/c/Program Files/Docker/Docker/resources/bin/docker.exe" "$@"
          EOF
          cat > "$HOME/bin/docker-credential-desktop" <<'EOF'
          #!/usr/bin/env bash
          exec "/mnt/c/Program Files/Docker/Docker/resources/bin/docker-credential-desktop.exe" "$@"
          EOF
          chmod +x "$HOME/bin/docker"
          chmod +x "$HOME/bin/docker-credential-desktop"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          mkdir -p "$HOME/.docker-actions"
          echo '{}' > "$HOME/.docker-actions/config.json"
          echo "DOCKER_CONFIG=$HOME/.docker-actions" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_CESIUM_ION_TOKEN=${{ secrets.NEXT_PUBLIC_CESIUM_ION_TOKEN }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_BING_MAPS_KEY=${{ secrets.NEXT_PUBLIC_BING_MAPS_KEY }}
            NEXT_PUBLIC_WWV_EDITION=${{ vars.NEXT_PUBLIC_WWV_EDITION || 'demo' }}
            NEXT_PUBLIC_DEMO_DEFAULT_PLUGINS=${{ vars.NEXT_PUBLIC_DEMO_DEFAULT_PLUGINS }}
            NEXT_PUBLIC_WS_ENGINE_URL=${{ vars.NEXT_PUBLIC_WS_ENGINE_URL }}
            NEXT_PUBLIC_WWV_PLUGIN_DATA_ENGINE_URL=${{ vars.NEXT_PUBLIC_WWV_PLUGIN_DATA_ENGINE_URL || 'https://dataenginev2.worldwideview.dev' }}
            NEXT_PUBLIC_ADSENSE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT_ID }}
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Make GHCR package public
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -fsS -X PATCH \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/linjedev/visibility \
            -d '{"visibility":"public"}'
